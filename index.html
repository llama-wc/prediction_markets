<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA_TERMINAL</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #09090b;
    --panel: #18181b;
    --text: #a1a1aa;
    --data: #ffffff;
    --cyan: #06b6d4;
    --cyan-dim: rgba(6, 182, 212, 0.15);
    --border: #27272a;
    --up: #10b981;
    --down: #ef4444;
  }

  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0; padding: 16px; height: 100vh; box-sizing: border-box;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* Header & Slicers */
  header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; flex-shrink: 0;}
  h1 { margin: 0; font-size: 18px; color: var(--data); font-weight: 800; letter-spacing: -0.5px; }
  .status { font-size: 11px; font-family: monospace; color: var(--cyan); }
  
  .filters { display: flex; gap: 8px; }
  .btn { 
    background: var(--panel); color: var(--text); border: 1px solid var(--border); 
    padding: 6px 14px; font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 4px;
    transition: all 0.2s;
  }
  .btn:hover { border-color: var(--text); }
  .btn.active { background: var(--data); color: var(--bg); border-color: var(--data); }

  /* Master-Detail Grid */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 16px;
    height: 100%;
    min-height: 0; /* allows children to scroll */
  }

  /* Left Side: The Screener */
  .screener {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .screener-header {
    display: grid; grid-template-columns: 40px 60px 1fr; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    font-size: 10px; font-weight: 700; color: var(--text); text-transform: uppercase;
  }
  .screener-list { overflow-y: auto; flex-grow: 1; }
  
  .row {
    display: grid; grid-template-columns: 40px 60px 1fr; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; align-items: center; transition: background 0.1s;
  }
  .row:hover { background: rgba(255,255,255,0.03); }
  .row.active-row { background: var(--cyan-dim); border-left: 3px solid var(--cyan); padding-left: 13px; }

  .r-prob { color: var(--cyan); font-weight: 800; font-size: 16px; }
  .r-vol { color: var(--text); font-size: 12px; font-variant-numeric: tabular-nums; }
  .r-title { color: var(--data); font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Right Side: The Chart Engine */
  .focus-node {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    display: flex; flex-direction: column; padding: 24px; overflow-y: auto;
  }
  .focus-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .focus-title { font-size: 24px; font-weight: 800; color: var(--data); margin: 0 0 8px 0; line-height: 1.2; max-width: 80%;}
  .focus-meta { font-size: 13px; color: var(--text); }
  .focus-prob-giant { font-size: 48px; font-weight: 800; color: var(--cyan); line-height: 1; text-align: right;}
  
  .chart-container { width: 100%; height: 300px; margin-bottom: 24px; }

  .rules-box {
    background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px; font-size: 13px; color: var(--text); line-height: 1.6;
  }
  .rules-title { font-size: 11px; text-transform: uppercase; font-weight: 700; color: var(--data); margin-bottom: 8px; }

  .action-bar { margin-top: 24px; display: flex; gap: 12px; }
  .trade-btn { 
    background: var(--cyan); color: var(--bg); font-weight: 700; font-size: 14px; 
    padding: 12px 24px; border-radius: 4px; text-decoration: none; display: inline-block;
  }
  .trade-btn:hover { opacity: 0.9; }

  /* Mobile Layout Fallback */
  @media (max-width: 900px) {
    .dashboard-grid { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
    body { overflow-y: auto; height: auto; }
    .screener-list { max-height: 300px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>ALPHA_TERMINAL</h1>
    <div class="status" id="sys-status">AWAITING PAYLOAD...</div>
  </div>
  <div class="filters" id="dynamic-categories"></div>
</header>

<div class="dashboard-grid">
  <div class="screener">
    <div class="screener-header">
      <div>PRB</div><div>VOL</div><div>ASSET</div>
    </div>
    <div class="screener-list" id="screener-list"></div>
  </div>

  <div class="focus-node" id="focus-node" style="display:none;">
    <div class="focus-header">
      <div>
        <h2 class="focus-title" id="f-title">Market Title</h2>
        <div class="focus-meta" id="f-meta">$0.0M Vol • Category</div>
      </div>
      <div class="focus-prob-giant" id="f-prob">0%</div>
    </div>
    
    <div class="chart-container">
      <canvas id="mainChart"></canvas>
    </div>

    <div class="rules-box">
      <div class="rules-title">Market Context & Rules</div>
      <div id="f-rules"></div>
    </div>

    <div class="action-bar">
      <a href="#" target="_blank" class="trade-btn" id="f-link">Open Order Book ↗</a>
    </div>
  </div>
</div>

<script>
  const screenerList = document.getElementById('screener-list');
  const focusNode = document.getElementById('focus-node');
  const catContainer = document.getElementById('dynamic-categories');
  const statusDisplay = document.getElementById('sys-status');

  let marketData = [];
  let activeCategory = "ALL";
  let activeAssetId = null;
  let chartInstance = null;
  const DATA_URL = "./market-data.json";

  async function bootPipeline() {
    try {
      const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
      marketData = await response.json();
      
      const timeString = new Date().toISOString().split('T')[1].substring(0,8);
      statusDisplay.innerHTML = `LIVE_SYNC: ${timeString} UTC`;
      
      buildSlicers();
      renderScreener();
      
      // Auto-select the first item if nothing is selected
      if (!activeAssetId && marketData.length > 0) {
        selectAsset(marketData[0].id);
      } else if (activeAssetId) {
        // Refresh the chart data silently if it's already open
        selectAsset(activeAssetId);
      }
    } catch (error) {
      statusDisplay.innerHTML = `ERR: DATA PIPELINE OFFLINE`;
    }
  }

  function buildSlicers() {
    const uniqueCategories = [...new Set(marketData.map(item => item.category))].filter(Boolean).slice(0, 5);
    let html = `<button class="btn ${activeCategory === 'ALL' ? 'active' : ''}" data-val="ALL">ALL</button>`;
    
    uniqueCategories.forEach(cat => {
      html += `<button class="btn ${activeCategory === cat ? 'active' : ''}" data-val="${cat}">${cat}</button>`;
    });
    catContainer.innerHTML = html;

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        activeCategory = e.target.dataset.val;
        buildSlicers();
        renderScreener();
      });
    });
  }

  function renderScreener() {
    let filtered = marketData.filter(bet => activeCategory === "ALL" || bet.category === activeCategory);
    
    let html = '';
    filtered.forEach(bet => {
      const volInt = Math.floor(bet.vol);
      const volDec = Math.floor((bet.vol % 1) * 10);
      const isActive = activeAssetId === bet.id ? 'active-row' : '';
      
      html += `<div class="row ${isActive}" data-id="${bet.id}">
        <div class="r-prob">${bet.prob}%</div>
        <div class="r-vol">$${volInt}.${volDec}M</div>
        <div class="r-title">${bet.market}</div>
      </div>`;
    });
    screenerList.innerHTML = html;

    // Bind clicks to open the chart
    document.querySelectorAll('.row').forEach(row => {
      row.addEventListener('click', () => selectAsset(row.dataset.id));
    });
  }

  function selectAsset(id) {
    activeAssetId = id;
    const bet = marketData.find(m => m.id === id);
    if(!bet) return;

    renderScreener(); // Updates the highlight state
    focusNode.style.display = 'flex';

    // Populate Data
    document.getElementById('f-title').innerText = bet.market;
    document.getElementById('f-prob').innerText = `${bet.prob}%`;
    document.getElementById('f-meta').innerText = `$${bet.vol.toFixed(1)}M Vol • ${bet.category}`;
    document.getElementById('f-rules').innerHTML = bet.description;
    document.getElementById('f-link').href = bet.url;

    renderChart(bet.history);
  }

  function renderChart(historyData) {
    const ctx = document.getElementById('mainChart').getContext('2d');
    
    if (chartInstance) { chartInstance.destroy(); }

    // Create a smooth, synthetic X-axis
    const labels = historyData.map((_, i) => `T-${historyData.length - 1 - i}`);

    // The Gradient Fill (The Flex)
    let gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(6, 182, 212, 0.4)'); // Cyan
    gradient.addColorStop(1, 'rgba(6, 182, 212, 0.0)');

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          data: historyData,
          borderColor: '#06b6d4',
          backgroundColor: gradient,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 6,
          fill: true,
          tension: 0.1 // Slight curve to the line
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            mode: 'index', intersect: false,
            backgroundColor: '#18181b', titleColor: '#a1a1aa', bodyColor: '#ffffff',
            borderColor: '#27272a', borderWidth: 1,
            callbacks: { label: function(context) { return context.parsed.y + '%'; } }
          }
        },
        scales: {
          x: { display: false }, // Hide X axis for cleaner look
          y: { 
            display: true, 
            min: 0, max: 100, 
            grid: { color: '#27272a', drawBorder: false },
            ticks: { color: '#a1a1aa', stepSize: 25, callback: function(value) { return value + '%'; } }
          }
        },
        interaction: { mode: 'nearest', axis: 'x', intersect: false }
      }
    });
  }

  bootPipeline();
  setInterval(bootPipeline, 60000);
</script>
</body>
</html>
