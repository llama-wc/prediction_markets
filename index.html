<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA_TERMINAL // POLYMARKET</title>
<style>
  :root {
    --bg: #000000;
    --text: #71717a; /* Zinc 500 */
    --data: #ffffff; /* Pure White */
    --up: #10b981;
    --down: #ef4444;
    --border: #27272a;
  }

  body {
    background: var(--bg); 
    color: var(--text);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 12px; 
    margin: 0; 
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }

  h1 { font-size: 16px; color: var(--data); margin: 0 0 4px 0; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}
  .status { font-size: 10px; color: var(--text); margin-bottom: 24px; text-transform: uppercase;}

  /* Brutalist Filters */
  .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 24px;}
  .btn { 
    background: transparent; color: var(--text); border: 1px solid var(--border); 
    padding: 6px 12px; font-size: 10px; font-weight: bold; cursor: pointer; 
    white-space: nowrap; text-transform: uppercase;
  }
  .btn:hover { border-color: var(--text); }
  .btn.active { background: var(--data); color: var(--bg); border-color: var(--data); }

  .panel-title { 
    font-size: 11px; color: var(--text); border-bottom: 1px solid var(--border); 
    padding-bottom: 6px; margin: 0 0 12px 0; font-weight: bold; letter-spacing: 1px;
  }

  /* Strict CSS Grid Alignment */
  .grid-header { 
    display: grid; grid-template-columns: 35px 45px 50px 1fr; gap: 12px; 
    font-size: 10px; color: var(--text); margin-bottom: 8px; font-weight: bold;
  }
  .row { 
    display: grid; grid-template-columns: 35px 45px 50px 1fr; gap: 12px; 
    padding: 10px 0; border-bottom: 1px dashed var(--border); align-items: center; 
  }
  .row:hover { background: rgba(255, 255, 255, 0.05); }

  /* Data Elements */
  .prob { color: var(--data); font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums; }
  .spark { color: var(--data); font-size: 12px; letter-spacing: 1px; }
  .vol { color: var(--text); font-variant-numeric: tabular-nums;}
  .market { color: var(--data); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .market a { color: inherit; text-decoration: none; }
  .market a:hover { text-decoration: underline; }

  .vel { font-weight: 700; font-size: 13px; font-variant-numeric: tabular-nums;}
  .shift-up { color: var(--up); }
  .shift-down { color: var(--down); }

  .grid-three { display: flex; flex-direction: column; gap: 32px; }
  .whale-row { font-size: 11px; padding: 6px 0; border-bottom: 1px dashed var(--border); }
</style>
</head>
<body>

<div class="terminal">
  <header>
    <h1>ALPHA_TERMINAL</h1>
    <div class="status" id="sys-status">BOOTING PIPELINE...</div>
  </header>

  <div class="filters" id="dynamic-categories">
    </div>

  <main class="grid-three">
    <section>
      <div class="panel-title">LIQUIDITY_NODE</div>
      <div class="grid-header">
        <div>PRB</div><div>TRND</div><div>VOL</div><div>ASSET</div>
      </div>
      <div id="volume-board"></div>
    </section>
    
    <section>
      <div class="panel-title">VELOCITY_NODE</div>
      <div class="grid-header">
        <div>24H_Δ</div><div>PRB</div><div></div><div>ASSET</div>
      </div>
      <div id="momentum-board"></div>
    </section>

    <section>
      <div class="panel-title">WHALE_ORDER_FLOW</div>
      <div id="whale-board"></div>
    </section>
  </main>
</div>

<script>
  const volumeBoard = document.getElementById('volume-board');
  const momentumBoard = document.getElementById('momentum-board');
  const whaleBoard = document.getElementById('whale-board');
  const statusDisplay = document.getElementById('sys-status');
  const categoryContainer = document.getElementById('dynamic-categories');

  let marketData = [];
  let activeCategory = "ALL";
  const DATA_URL = "./market-data.json";

  // Replaced Braille with highly readable Block Elements
  function getBlockSparkline(history) {
    if(!history || history.length === 0) return "—";
    const min = Math.min(...history);
    const max = Math.max(...history);
    const range = (max - min) || 1;
    const blocks = ['_', '▃', '▆', '█']; 
    
    return history.slice(-4).map(val => {
      const normalized = Math.floor(((val - min) / range) * 3.99);
      return blocks[normalized];
    }).join('');
  }

  async function bootPipeline() {
    try {
      const response = await fetch(`${DATA_URL}?t=${new Date().getTime()}`);
      if (!response.ok) throw new Error("AWAITING CRON");
      
      marketData = await response.json();
      const timeString = new Date().toISOString().split('T')[1].substring(0,8);
      statusDisplay.innerHTML = `LIVE_SYNC: ${timeString} UTC`;
      
      buildDynamicSlicers();
      renderDashboards();
    } catch (error) {
      statusDisplay.innerHTML = `ERR: PIPELINE SEVERED.`;
    }
  }

  function buildDynamicSlicers() {
    const uniqueCategories = [...new Set(marketData.map(item => item.category))].filter(Boolean).slice(0, 5);
    let html = `<button class="btn ${activeCategory === 'ALL' ? 'active' : ''}" data-val="ALL">ALL</button>`;
    
    uniqueCategories.forEach(cat => {
      const isActive = activeCategory === cat ? 'active' : '';
      html += `<button class="btn ${isActive}" data-val="${cat}">${cat}</button>`;
    });
    
    categoryContainer.innerHTML = html;

    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        activeCategory = e.target.dataset.val;
        buildDynamicSlicers();
        renderDashboards();
      });
    });
  }

  function renderDashboards() {
    if (marketData.length === 0) return;

    let filteredData = marketData.filter(bet => activeCategory === "ALL" || bet.category === activeCategory);
    let volSorted = [...filteredData].sort((a, b) => b.vol - a.vol).slice(0, 7);
    let momSorted = [...filteredData].sort((a, b) => Math.abs(b.epoch_velocity || 0) - Math.abs(a.epoch_velocity || 0)).slice(0, 7);

    // --- RENDER LIQUIDITY ---
    let volHtml = '';
    if (volSorted.length === 0) volHtml = `<div class="row"><div style="grid-column: 1 / -1; color:var(--text)">NO DATA</div></div>`;
    
    volSorted.forEach(bet => {
      const spark = getBlockSparkline(bet.history);
      const volInt = Math.floor(bet.vol);
      const volDec = Math.floor((bet.vol % 1) * 10);
      
      volHtml += `<div class="row">
        <div class="prob">${String(bet.prob).padStart(2, '0')}</div>
        <div class="spark">${spark}</div>
        <div class="vol">$${volInt}.${volDec}M</div>
        <div class="market"><a href="${bet.url}" target="_blank">${bet.market}</a></div>
      </div>`;
    });
    volumeBoard.innerHTML = volHtml;

    // --- RENDER VELOCITY ---
    let momHtml = '';
    if (momSorted.length === 0) momHtml = `<div class="row"><div style="grid-column: 1 / -1; color:var(--text)">NO DATA</div></div>`;

    momSorted.forEach(bet => {
      const vel = bet.epoch_velocity || 0;
      const shiftIcon = vel >= 0 ? '▲' : '▼';
      const shiftClass = vel >= 0 ? 'shift-up' : 'shift-down';
      
      momHtml += `<div class="row">
        <div class="vel ${shiftClass}">${shiftIcon}${Math.abs(vel)}</div>
        <div class="prob">${String(bet.prob).padStart(2, '0')}</div>
        <div></div>
        <div class="market"><a href="${bet.url}" target="_blank">${bet.market}</a></div>
      </div>`;
    });
    momentumBoard.innerHTML = momHtml;
  }

  // --- WHALE WATCH SIMULATOR ---
  function pushWhaleOrder() {
    if (marketData.length === 0) return;
    const trade = marketData[Math.floor(Math.random() * Math.min(marketData.length, 5))];
    if(!trade) return;
    
    const time = new Date().toISOString().split('T')[1].substring(0,8);
    const size = Math.floor(Math.random() * 90) + 10;
    const side = Math.random() > 0.5 ? "BUY YES" : "SELL NO";
    const user = "0x" + Math.random().toString(16).substring(2, 6);
    
    const row = document.createElement('div');
    row.className = 'whale-row';
    row.innerHTML = `<span style="color:var(--text)">[${time}]</span> <span style="color:var(--up); font-weight:bold;">$${size}.0k</span> ${side} &nbsp;|&nbsp; <a href="${trade.url}" target="_blank" style="color:var(--data); text-decoration:none;">${trade.market}</a>`;
    
    whaleBoard.prepend(row);
    if (whaleBoard.children.length > 5) whaleBoard.lastChild.remove();
  }

  bootPipeline();
  setInterval(bootPipeline, 60000); 
  setInterval(pushWhaleOrder, 3500); 
</script>
</body>
</html>
